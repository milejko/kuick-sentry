name: "CI"

on:
  pull_request:
  push:
    branches:
      - '**'

jobs:

  Testing:
    name: "PHP Checks"
    strategy:
      matrix:
        php-version: ['8.3', '8.4', '8.5']
      fail-fast: true
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Run tests
      run: make test
      env:
        PHP_VERSION: ${{ matrix.php-version }}
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
